<script>
let canvas = document.createElement("canvas");
canvas.width = window.innerWidth - 20;
canvas.height = 300;
canvas.style.background = "#111";
canvas.style.borderRadius = "20px";
canvas.style.display = "block";
canvas.style.margin = "20px auto";
document.body.appendChild(canvas);

let ctx = canvas.getContext("2d");

let player = { x:50, y:150, size:20 };
let enemy = { x:canvas.width, y:Math.random()*260, size:20, speed:4 };
let score = 0;
let gameOver = false;

function drawCircle(obj,color){
ctx.beginPath();
ctx.arc(obj.x,obj.y,obj.size,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();
}

function update(){
if(gameOver) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

enemy.x -= enemy.speed;

if(enemy.x < 0){
enemy.x = canvas.width;
enemy.y = Math.random()*260;
score++;
}

let dx = player.x - enemy.x;
let dy = player.y - enemy.y;
let distance = Math.sqrt(dx*dx + dy*dy);

if(distance < player.size + enemy.size){
gameOver = true;
alert("Game Over! Score: " + score);
}

drawCircle(player,"cyan");
drawCircle(enemy,"red");

ctx.fillStyle="white";
ctx.fillText("Score: "+score,10,20);

requestAnimationFrame(update);
}

canvas.addEventListener("touchmove",function(e){
let rect = canvas.getBoundingClientRect();
player.y = e.touches[0].clientY - rect.top;
});

canvas.addEventListener("mousemove",function(e){
let rect = canvas.getBoundingClientRect();
player.y = e.clientY - rect.top;
});

update();
</script>
