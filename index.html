<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Cyber Arena - Ball Sort Ranked</title>

<style>
body{
margin:0;
font-family:Arial;
background:#060b18;
color:white;
text-align:center;
}
h1{
color:cyan;
text-shadow:0 0 15px cyan;
}
.screen{display:none;padding:15px;}
button{
padding:10px 15px;
margin:6px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,cyan,purple);
color:black;
font-weight:bold;
}
.tubes{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}
.tube{
width:60px;
height:200px;
border:2px solid cyan;
border-radius:10px;
margin:10px;
display:flex;
flex-direction:column-reverse;
padding:5px;
cursor:pointer;
}
.ball{
width:100%;
height:35px;
border-radius:50%;
margin-bottom:5px;
}
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px cyan;
color:cyan;
font-size:18px;
z-index:9999;
}
</style>
</head>
<body>

<h1>⚡ Ball Sort Ranked ⚡</h1>

<div id="login" class="screen">
<input id="username" placeholder="اسم اللاعب">
<button onclick="login()">دخول</button>
</div>

<div id="lobby" class="screen">
<p id="playerInfo"></p>
<button onclick="startGame()">🎮 ابدأ Ranked</button>
</div>

<div id="game" class="screen">
<p id="movesText"></p>
<div class="tubes" id="tubes"></div>
<button onclick="backLobby()">رجوع</button>
</div>

<script>
let players=JSON.parse(localStorage.players||"[]");
let current=null;
let selected=null;
let moves=0;
let tubesData=[];

function save(){localStorage.players=JSON.stringify(players)}

function login(){
let name=username.value;
if(!name)return;
let p=players.find(x=>x.name===name);
if(!p){
p={name,level:1,xp:0,elo:1000};
players.push(p);
save();
}
current=p;
updateLobby();
go("lobby");
}

function updateLobby(){
playerInfo.innerHTML=
"👤 "+current.name+
"<br>Level: "+current.level+
"<br>ELO: "+current.elo;
}

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function startGame(){
moves=0;
movesText.innerText="الحركات: 0";
tubesData=[
["red","blue","green","yellow"],
["yellow","green","blue","red"],
["blue","red","yellow","green"],
[],
[]
];
render();
go("game");
}

function render(){
tubes.innerHTML="";
tubesData.forEach((tube,i)=>{
let div=document.createElement("div");
div.className="tube";
div.onclick=()=>selectTube(i);
tube.forEach(color=>{
let ball=document.createElement("div");
ball.className="ball";
ball.style.background=color;
div.appendChild(ball);
});
tubes.appendChild(div);
});
}

function selectTube(i){
if(selected===null){
selected=i;
return;
}
if(selected===i){selected=null;return;}

let from=tubesData[selected];
let to=tubesData[i];

if(from.length===0){selected=null;return;}
if(to.length>=4){selected=null;return;}

let color=from[from.length-1];
if(to.length===0||to[to.length-1]===color){
to.push(from.pop());
moves++;
movesText.innerText="الحركات: "+moves;
checkWin();
}
selected=null;
render();
}

function checkWin(){
let win=tubesData.every(tube=>{
if(tube.length===0)return true;
return tube.length===4 && tube.every(c=>c===tube[0]);
});
if(win){
rankWin();
}
}

function rankWin(){
let opponent=1000+Math.random()*500;
let k=32;
let expected=1/(1+Math.pow(10,(opponent-current.elo)/400));
current.elo+=Math.round(k*(1-expected));
current.xp+=50;
if(current.xp>=current.level*100){
current.xp=0;
current.level++;
}
save();
showPopup("🏆 فوز Ranked + ELO");
setTimeout(()=>{updateLobby();go("lobby");},1500);
}

function showPopup(msg){
let p=document.createElement("div");
p.className="popup";
p.innerHTML=msg;
document.body.appendChild(p);
setTimeout(()=>p.remove(),1500);
}

function backLobby(){
go("lobby");
}

go("login");
</script>

</body>
</html>
