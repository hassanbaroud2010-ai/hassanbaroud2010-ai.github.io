<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Cyber Arena - CYBER GOD MODE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#060b18;
color:white;
}
h1{
text-align:center;
color:cyan;
text-shadow:0 0 15px cyan,0 0 30px purple;
}
.screen{display:none;padding:20px;}
.card{
background:#111827;
padding:15px;
border-radius:12px;
margin:10px 0;
box-shadow:0 0 20px rgba(0,255,255,.2);
}
button{
padding:8px 14px;
margin:6px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,cyan,purple);
color:black;
font-weight:bold;
cursor:pointer;
}
.progress{
background:#222;
height:16px;
border-radius:8px;
overflow:hidden;
margin-top:6px;
}
.bar{
height:100%;
background:linear-gradient(90deg,cyan,purple);
width:0%;
}
</style>
</head>
<body>

<h1>⚡ CYBER GOD MODE ⚡</h1>

<div id="login" class="screen">
<div class="card">
<input id="username" placeholder="اسم اللاعب">
<button onclick="login()">دخول</button>
</div>
</div>

<div id="lobby" class="screen">
<div class="card">
<h3 id="playerName"></h3>
<p>Level: <span id="level"></span></p>
<p>ELO: <span id="elo"></span> (<span id="rank"></span>)</p>
<p>Coins: <span id="coins"></span></p>

<p>Battle Pass</p>
<div class="progress"><div class="bar" id="bpBar"></div></div>

<button onclick="startRanked()">🏆 Ranked</button>
<button onclick="startBoss()">👾 Boss</button>
<button onclick="dailyReward()">📅 Daily</button>
<button onclick="openLoot()">🎁 Loot Box (50)</button>
<button onclick="go('login')">خروج</button>
</div>
</div>

<script>
let players=JSON.parse(localStorage.players||"[]");
let current=null;

function save(){localStorage.players=JSON.stringify(players)}

function login(){
let name=username.value;
if(!name)return;
let p=players.find(x=>x.name===name);
if(!p){
p={name,level:1,xp:0,elo:1000,coins:100,bp:0};
players.push(p);
save();
}
current=p;
update();
go('lobby');
}

function update(){
playerName.innerText=current.name;
level.innerText=current.level;
elo.innerText=current.elo;
coins.innerText=current.coins;
rank.innerText=getRank(current.elo);
bpBar.style.width=(current.bp%100)+"%";
}

function go(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function addXP(x){
current.xp+=x;
current.bp+=x;
if(current.xp>=current.level*100){
current.xp=0;
current.level++;
}
save();
update();
}

function getRank(e){
if(e<1200)return"Bronze";
if(e<1400)return"Silver";
if(e<1600)return"Gold";
if(e<1800)return"Platinum";
return"Cyber God";
}

function startRanked(){
let win=Math.random()>0.4;
let opponent=1000+Math.random()*800;
let k=32;
let expected=1/(1+Math.pow(10,(opponent-current.elo)/400));
if(win){
current.elo+=Math.round(k*(1-expected));
addXP(50);
current.coins+=20;
alert("🏆 فوز Ranked!");
}else{
current.elo-=Math.round(k*(expected));
alert("❌ خسارة Ranked");
}
save();
update();
}

function startBoss(){
let win=Math.random()>0.6;
if(win){
current.elo+=40;
addXP(120);
current.coins+=60;
alert("👾 هزمت الـ Boss!");
}else{
current.elo-=20;
alert("👾 خسرت أمام الـ Boss!");
}
save();
update();
}

function dailyReward(){
let today=new Date().toDateString();
if(localStorage.daily===today){
alert("تم استلام مكافأة اليوم");
return;
}
localStorage.daily=today;
current.coins+=30;
addXP(40);
alert("📅 مكافأة يومية!");
save();
update();
}

function openLoot(){
if(current.coins<50){alert("عملات غير كافية");return;}
current.coins-=50;
let reward=Math.random();
if(reward<0.4){
current.coins+=100;
alert("💰 ربحت 100 Coins!");
}else if(reward<0.7){
addXP(80);
alert("⭐ ربحت 80 XP!");
}else{
current.elo+=50;
alert("⚡ Bonus +50 ELO!");
}
save();
update();
}

go('login');
</script>

</body>
</html>
